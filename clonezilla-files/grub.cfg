set default="0"
set timeout="30"

insmod efi_gop
insmod efi_uga
insmod vbe

if loadfont /EFI/boot/unicode.pf2; then
  set gfxmode=auto
  insmod gfxterm
  terminal_output gfxterm
fi

set color_normal=cyan/blue
set color_highlight=white/blue

menuentry "Disco -> Samba (Automatico)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on nomodeset ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -p poweroff savedisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 vga=788 ip=dhcp nosplash net.ifnames=0 i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}

menuentry "Samba -> Disco (Automatico)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on nomodeset ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -scr -p poweroff restoredisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 vga=788 ip=dhcp nosplash net.ifnames=0 i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}

menuentry "Clonezilla live (VGA 800x600)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components quiet noswap edd=on nomodeset locales= keyboard-layouts= ocs_live_run="ocs-live-general" ocs_live_extra_param="" ocs_live_batch="no" vga=788 ip= net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}
