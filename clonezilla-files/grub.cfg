set default="0"
set timeout="30"

# Fixes the stretching/barcode effect for UEFI
insmod efi_gop
insmod efi_uga
insmod font

set gfxmode=1024x768
set gfxpayload=keep

if loadfont /boot/grub/unicode.pf2; then
  insmod gfxterm
  terminal_output gfxterm
fi

set color_normal=cyan/blue
set color_highlight=white/blue

# ENTRADA PARA HACER IMAGEN AUTOMATIZADA
menuentry "Disco -> Samba (Automatico)" {
  search --set -f /live/vmlinuz
  # Added modeset=0 and video flags to prevent post-menu stretching
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -p poweroff savedisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 ip=dhcp nosplash net.ifnames=0 nomodeset i915.modeset=0 nouveau.modeset=0 nvidia.modeset=0 radeon.modeset=0 video=1024x768@60 vga=normal
  initrd /live/initrd.img
}

# ENTRADA PARA RESTAURAR AUTOMATIZADA
menuentry "Samba -> Disco (Automatico)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -scr -p poweroff restoredisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 ip=dhcp nosplash net.ifnames=0 nomodeset i915.modeset=0 nouveau.modeset=0 nvidia.modeset=0 radeon.modeset=0 video=1024x768@60 vga=normal
  initrd /live/initrd.img
}

menuentry "Clonezilla live (Standard Graphic Mode)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components quiet noswap edd=on nomodeset locales= keyboard-layouts= ocs_live_run="ocs-live-general" ocs_live_extra_param="" ocs_live_batch="no" ip= net.ifnames=0 nosplash i915.modeset=0 nouveau.modeset=0 video=1024x768@60 vga=normal
  initrd /live/initrd.img
}
