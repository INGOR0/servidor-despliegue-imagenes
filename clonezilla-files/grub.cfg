set default="0"
set timeout="30"

# Load UEFI-specific video modules
insmod efi_gop
insmod efi_uga
insmod font

# Force a safe resolution for the GRUB menu
# 'auto' often fails on modern high-res screens or virtualized PXE environments
set gfxmode=1024x768
set gfxpayload=keep

# Ensure the font path is correct for the internal ISO structure
if loadfont /boot/grub/unicode.pf2; then
  insmod gfxterm
  terminal_output gfxterm
fi

set color_normal=cyan/blue
set color_highlight=white/blue

menuentry "Disco -> Samba (Automatico)" {
  search --set -f /live/vmlinuz
  # Removed vga=788 (Legacy) and added video=1024x768 for UEFI stability
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on nomodeset ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -p poweroff savedisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 video=1024x768 ip=dhcp nosplash net.ifnames=0 i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}

menuentry "Samba -> Disco (Automatico)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components noswap nolocales edd=on nomodeset ocs_repository="smb3://__SAMBA_USER__:__SAMBA_PASS__@__SERVER_IP__/Clonezilla" ocs_live_run="ocs-sr -q2 --batch -j2 -k1 -sfsck -scr -p poweroff restoredisk ask_user ask_user" ocs_live_extra_param="" ocs_live_batch="yes" keyboard-layouts=NONE locales=en_US.UTF-8 video=1024x768 ip=dhcp nosplash net.ifnames=0 i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}

menuentry "Clonezilla live (Standard Resolution)" {
  search --set -f /live/vmlinuz
  linux /live/vmlinuz boot=live union=overlay username=user config components quiet noswap edd=on nomodeset locales= keyboard-layouts= ocs_live_run="ocs-live-general" ocs_live_extra_param="" ocs_live_batch="no" video=1024x768 ip= net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  initrd /live/initrd.img
}
